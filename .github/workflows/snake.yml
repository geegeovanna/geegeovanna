name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: geegeovanna
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#800020&dot_days=#1a1a1a,#301e1e,#4a3232,#634747,#800020
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#800020&color_dots=#0b0b0b,#3d0007,#6b000d,#9e0013,#ff1a35
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
